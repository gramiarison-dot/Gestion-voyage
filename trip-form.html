<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire voyage</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container"><a class="navbar-brand" href="trips.html"><i class="fas fa-arrow-left"></i> Retour</a></div>
    </nav>
    <div class="container mt-4" style="max-width: 600px;">
        <h2 id="formTitle">Ajouter un voyage</h2>
        <form id="tripForm">
            <div class="mb-3"><input type="text" id="destination" class="form-control" placeholder="Destination" required></div>
            <div class="mb-3"><input type="datetime-local" id="departure_date" class="form-control" required></div>
            <div class="mb-3"><input type="datetime-local" id="return_date" class="form-control"></div>
            <div class="mb-3"><input type="number" id="price" class="form-control" placeholder="Prix (€)" step="0.01" required></div>
            <div class="mb-3"><input type="number" id="available_seats" class="form-control" placeholder="Places disponibles" required></div>
            <div class="mb-3"><textarea id="description" class="form-control" placeholder="Description"></textarea></div>
            <button type="submit" class="btn btn-primary w-100">Enregistrer</button>
        </form>
        <div id="msg" class="mt-3"></div>
    </div>
    <script>
   document.getElementById('tripForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = {
        destination: document.getElementById('destination').value,
        departure_date: document.getElementById('departure_date').value,
        return_date: document.getElementById('return_date').value || null,
        price: parseFloat(document.getElementById('price').value),
        available_seats: parseInt(document.getElementById('available_seats').value),
        description: document.getElementById('description').value
    };
    const url = isEdit ? `/api/trips/${tripId}` : '/api/trips';
    const method = isEdit ? 'PUT' : 'POST';
    try {
        const res = await fetch(url, {
            method,
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify(data)
        });
        if (!res.ok) {
            const err = await res.json();
            throw new Error(err.error || 'Erreur serveur');
        }
        document.getElementById('msg').innerHTML = '<div class="alert alert-success">Enregistré !</div>';
        setTimeout(() => window.location.href = 'trips.html', 1500);
    } catch (err) {
        document.getElementById('msg').innerHTML = `<div class="alert alert-danger">❌ ${err.message}</div>`;
        console.error(err);
    }
});
</script>
</body>
</html>
