<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmation - VoyageReserv</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #e0f2fe, #f0f9ff);
            min-height: 100vh;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            padding: 2rem 1rem;
        }
        .confirmation-card {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 2rem;
            box-shadow: 0 25px 40px -12px rgba(0,0,0,0.2);
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        .confirmation-card:hover {
            transform: translateY(-5px);
        }
        .card-header-success {
            background: linear-gradient(120deg, #059669, #10b981);
            padding: 1.5rem;
            text-align: center;
            color: white;
        }
        .card-header-success i {
            font-size: 3rem;
            background: white;
            color: #059669;
            border-radius: 50%;
            padding: 0.8rem;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
            margin-bottom: 0.5rem;
        }
        .card-header-success h2 {
            font-weight: 800;
            margin-top: 0.5rem;
        }
        .details-list {
            padding: 1.5rem;
        }
        .detail-item {
            display: flex;
            justify-content: space-between;
            padding: 0.8rem 0;
            border-bottom: 1px solid #e2e8f0;
        }
        .detail-label {
            font-weight: 600;
            color: #1e293b;
        }
        .detail-value {
            color: #0f172a;
            font-weight: 500;
        }
        .badge-status {
            background: #d1fae5;
            color: #065f46;
            padding: 0.3rem 1rem;
            border-radius: 60px;
            font-weight: 600;
        }
        .btn-group-custom {
            display: flex;
            gap: 1rem;
            justify-content: center;
            padding: 1.5rem;
            background: #f8fafc;
            border-top: 1px solid #e2e8f0;
        }
        .btn-primary-modern {
            background: linear-gradient(95deg, #2563eb, #1d4ed8);
            border: none;
            border-radius: 60px;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-primary-modern:hover {
            transform: scale(0.98);
            box-shadow: 0 8px 20px rgba(37,99,235,0.3);
        }
        .btn-outline-modern {
            border-radius: 60px;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            border: 1px solid #cbd5e1;
            color: #1e293b;
            transition: all 0.2s;
        }
        .btn-outline-modern:hover {
            background: #f1f5f9;
            border-color: #94a3b8;
        }
        @media (max-width: 500px) {
            .confirmation-card { margin: 0 1rem; }
            .detail-item { flex-direction: column; gap: 0.3rem; }
        }
    </style>
</head>
<body>
    <div class="confirmation-card">
        <div class="card-header-success text-center">
            <i class="fas fa-check-circle"></i>
            <h2>Réservation confirmée !</h2>
            <p class="mb-0">Votre trajet est réservé avec succès</p>
        </div>
        <div id="details" class="details-list">
            <!-- Le contenu dynamique apparaîtra ici -->
            <div class="text-center py-4">
                <div class="spinner-border text-success" role="status"></div>
                <p class="mt-2">Chargement des détails...</p>
            </div>
        </div>
        <div class="btn-group-custom">
            <a href="../Public/index.html" class="btn btn-outline-modern"><i class="fas fa-home me-2"></i>Accueil</a>
            <a href="../Public/historique.html" class="btn btn-primary-modern"><i class="fas fa-history me-2"></i>Historique</a>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const reservationId = urlParams.get('reservationId');

        if (!reservationId) {
            document.getElementById('details').innerHTML = `
                <div class="alert alert-danger text-center">Aucun ID de réservation fourni.</div>
            `;
        } else {
            async function loadConfirmation() {
                try {
                    const res = await fetch(`/api/reservations/${reservationId}`);
                    if (res.status === 401) {
                        window.location.href = '/login';
                        return;
                    }
                    if (!res.ok) throw new Error('Impossible de charger la réservation');
                    const data = await res.json();
                    document.getElementById('details').innerHTML = `
                        <div class="detail-item">
                            <span class="detail-label"><i class="fas fa-ticket-alt me-2"></i>Réservation #</span>
                            <span class="detail-value">${data.id}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label"><i class="fas fa-route me-2"></i>Trajet</span>
                            <span class="detail-value">${escapeHtml(data.departure)} → ${escapeHtml(data.destination)}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label"><i class="fas fa-calendar-day me-2"></i>Départ</span>
                            <span class="detail-value">${new Date(data.departure_time).toLocaleString('fr-FR')}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label"><i class="fas fa-chair me-2"></i>Sièges réservés</span>
                            <span class="detail-value"><strong>${data.seats}</strong> <span class="badge bg-info text-dark">${data.seats.split(',').length} places</span></span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label"><i class="fas fa-euro-sign me-2"></i>Prix total</span>
                            <span class="detail-value">${parseFloat(data.total_price).toFixed(2)} €</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label"><i class="fas fa-info-circle me-2"></i>Statut</span>
                            <span class="badge-status">${data.status === 'confirmed' ? 'Confirmé' : 'Annulé'}</span>
                        </div>
                    `;
                } catch (err) {
                    document.getElementById('details').innerHTML = `
                        <div class="alert alert-danger text-center">Erreur lors du chargement des détails. Veuillez réessayer.</div>
                    `;
                }
            }

            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
            }

            loadConfirmation();
        }
    </script>
</body>
</html>
