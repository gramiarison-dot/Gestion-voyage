<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Réservations - VoyageReserv</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #e0e7ff 0%, #c7d2fe 50%, #a5b4fc 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .container-modern {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .header-modern {
            background: linear-gradient(135deg, #1e293b 0%, #334155 50%, #475569 100%);
            border-radius: 20px;
            padding: 25px 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(30, 41, 59, 0.4);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid #facc15;
        }

        .header-modern h1 {
            font-size: 2rem;
            font-weight: 700;
            color: white;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-modern h1 i {
            color: #facc15;
        }

        .header-modern .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-modern .user-info span {
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 18px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-logout {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            border: none;
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-logout:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(239, 68, 68, 0.4);
        }

        /* Stats bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-mini {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 15px 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            border: 2px solid transparent;
            transition: all 0.3s;
        }

        .stat-mini:hover {
            border-color: #facc15;
            transform: translateY(-3px);
        }

        .stat-mini .stat-number {
            font-size: 1.8rem;
            font-weight: 800;
            color: #1e293b;
            display: block;
        }

        .stat-mini .stat-label {
            font-size: 0.85rem;
            color: #64748b;
            font-weight: 500;
        }

        .stat-mini .stat-icon {
            font-size: 1.5rem;
            display: block;
            margin-bottom: 5px;
        }

        /* Card Reservation */
        .card-reservation {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
            transition: all 0.3s;
            border-left: 5px solid #3b82f6;
            border: 2px solid rgba(255, 255, 255, 0.5);
        }

        .card-reservation:hover {
            transform: translateX(8px) translateY(-3px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.12);
            border-color: #facc15;
        }

        .card-reservation .reservation-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .card-reservation .reservation-destination {
            font-size: 1.4rem;
            font-weight: 700;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-reservation .reservation-destination i {
            color: #3b82f6;
            font-size: 1.6rem;
        }

        .status-badge-large {
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.85rem;
            white-space: nowrap;
        }

        .status-pending {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: white;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
        }

        .status-confirmed {
            background: linear-gradient(135deg, #34d399, #10b981);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        .status-cancelled {
            background: linear-gradient(135deg, #f87171, #ef4444);
            color: white;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
        }

        .reservation-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px;
            padding: 15px 0;
            border-top: 2px solid #f1f5f9;
            border-bottom: 2px solid #f1f5f9;
        }

        .reservation-details .detail-item {
            display: flex;
            flex-direction: column;
        }

        .reservation-details .detail-item .label {
            font-size: 0.75rem;
            color: #94a3b8;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .reservation-details .detail-item .value {
            font-size: 1rem;
            font-weight: 600;
            color: #1e293b;
            margin-top: 3px;
        }

        .btn-cancel {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            border: none;
            color: white;
            padding: 8px 24px;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s;
            margin-top: 15px;
        }

        .btn-cancel:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(239, 68, 68, 0.4);
        }

        .btn-cancel:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.5);
        }

        .empty-state i {
            font-size: 4rem;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .empty-state h3 {
            color: #1e293b;
            font-weight: 700;
        }

        .empty-state p {
            color: #64748b;
        }

        .btn-primary-modern {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            padding: 10px 30px;
            border-radius: 50px;
            font-weight: 600;
            color: white;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary-modern:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(59, 130, 246, 0.4);
            color: white;
        }

        /* Navbar */
        .navbar-modern {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%) !important;
            padding: 1rem 0;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .navbar-modern .navbar-brand {
            font-weight: 800;
            font-size: 1.6rem;
            color: white !important;
        }

        .navbar-modern .navbar-brand i {
            color: #facc15;
            margin-right: 10px;
        }

        .navbar-modern .nav-link {
            color: rgba(255, 255, 255, 0.8) !important;
            font-weight: 500;
            transition: all 0.3s;
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
        }

        .navbar-modern .nav-link:hover {
            color: white !important;
            background: rgba(255, 255, 255, 0.1);
        }

        .navbar-modern .nav-link.active {
            background: rgba(255, 255, 255, 0.15);
            color: white !important;
        }

        @media (max-width: 768px) {
            .header-modern {
                flex-direction: column;
                gap: 15px;
                text-align: center;
                padding: 20px;
            }

            .header-modern h1 {
                font-size: 1.5rem;
                justify-content: center;
            }

            .header-modern .user-info {
                flex-wrap: wrap;
                justify-content: center;
            }

            .card-reservation .reservation-header {
                flex-direction: column;
                text-align: center;
            }

            .reservation-details {
                grid-template-columns: 1fr 1fr;
                text-align: center;
            }

            .stats-bar {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .reservation-details {
                grid-template-columns: 1fr;
            }

            .container-modern {
                padding: 0 5px;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-modern">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-car"></i> VoyageReserv
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">
                            <i class="fas fa-chart-pie"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="reservations.html">
                            <i class="fas fa-ticket"></i> Mes réservations
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="historique.html">
                            <i class="fas fa-clock-rotate-left"></i> Historique
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="logout()">
                            <i class="fas fa-sign-out-alt"></i> Déconnexion
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-modern">
        <!-- Header -->
        <div class="header-modern">
            <h1>
                <i class="fas fa-car-side"></i>
                Mes Réservations
            </h1>
            <div class="user-info">
                <span><i class="fas fa-user-circle"></i> <span id="userName">Client</span></span>
                <button class="btn-logout" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Déconnexion
                </button>
            </div>
        </div>

        <!-- Statistiques -->
        <div class="stats-bar">
            <div class="stat-mini">
                <span class="stat-icon"><i class="fas fa-ticket" style="color:#3b82f6;"></i></span>
                <span class="stat-number" id="totalReservations">0</span>
                <span class="stat-label">Total réservations</span>
            </div>
            <div class="stat-mini">
                <span class="stat-icon"><i class="fas fa-clock" style="color:#f59e0b;"></i></span>
                <span class="stat-number" id="pendingReservations">0</span>
                <span class="stat-label">En attente</span>
            </div>
            <div class="stat-mini">
                <span class="stat-icon"><i class="fas fa-check-circle" style="color:#10b981;"></i></span>
                <span class="stat-number" id="confirmedReservations">0</span>
                <span class="stat-label">Confirmées</span>
            </div>
            <div class="stat-mini">
                <span class="stat-icon"><i class="fas fa-times-circle" style="color:#ef4444;"></i></span>
                <span class="stat-number" id="cancelledReservations">0</span>
                <span class="stat-label">Annulées</span>
            </div>
        </div>

        <!-- Liste des réservations -->
        <div id="reservationsContainer">
            <div class="empty-state">
                <i class="fas fa-spinner fa-spin"></i>
                <h3>Chargement des réservations...</h3>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/login';
        }

        const userName = localStorage.getItem('userName') || 'Client';
        document.getElementById('userName').textContent = userName;

        async function loadReservations() {
            try {
                const response = await fetch('/api/reservations', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error('Erreur chargement');
                const reservations = await response.json();

                // Mettre à jour les stats
                const total = reservations.length;
                const pending = reservations.filter(r => r.status === 'pending').length;
                const confirmed = reservations.filter(r => r.status === 'confirmed').length;
                const cancelled = reservations.filter(r => r.status === 'cancelled').length;

                document.getElementById('totalReservations').textContent = total;
                document.getElementById('pendingReservations').textContent = pending;
                document.getElementById('confirmedReservations').textContent = confirmed;
                document.getElementById('cancelledReservations').textContent = cancelled;

                const container = document.getElementById('reservationsContainer');

                if (reservations.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-car"></i>
                            <h3>Aucune réservation pour le moment</h3>
                            <p>Consultez les voyages disponibles et réservez votre prochaine destination !</p>
                            <a href="trips.html" class="btn-primary-modern">
                                <i class="fas fa-car-side"></i> Voir les voyages
                            </a>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = reservations.map(r => {
                    const statusClass = {
                        'pending': 'status-pending',
                        'confirmed': 'status-confirmed',
                        'cancelled': 'status-cancelled'
                    }[r.status] || 'status-pending';

                    const statusLabel = {
                        'pending': '⏳ En attente',
                        'confirmed': '✅ Confirmée',
                        'cancelled': '❌ Annulée'
                    }[r.status] || r.status;

                    const canCancel = r.status === 'pending' || r.status === 'confirmed';

                    return `
                        <div class="card-reservation">
                            <div class="reservation-header">
                                <div class="reservation-destination">
                                    <i class="fas fa-map-pin"></i>
                                    ${r.destination || 'Destination inconnue'}
                                </div>
                                <span class="status-badge-large ${statusClass}">${statusLabel}</span>
                            </div>
                            <div class="reservation-details">
                                <div class="detail-item">
                                    <span class="label"><i class="fas fa-calendar-day"></i> Départ</span>
                                    <span class="value">${new Date(r.departure_date).toLocaleString('fr-FR')}</span>
                                </div>
                                <div class="detail-item">
                                    <span class="label"><i class="fas fa-users"></i> Places</span>
                                    <span class="value">${r.seats}</span>
                                </div>
                                <div class="detail-item">
                                    <span class="label"><i class="fas fa-tag"></i> Prix total</span>
                                    <span class="value" style="color:#3b82f6;">${(r.price || r.total_price || 0) * r.seats} €</span>
                                </div>
                                <div class="detail-item">
                                    <span class="label"><i class="fas fa-calendar-check"></i> Réservation</span>
                                    <span class="value">${new Date(r.date_reservation).toLocaleString('fr-FR')}</span>
                                </div>
                            </div>
                            ${canCancel ? `
                                <button class="btn-cancel" onclick="cancelReservation(${r.id})">
                                    <i class="fas fa-times"></i> Annuler la réservation
                                </button>
                            ` : `
                                <span style="color:#94a3b8; font-size:0.9rem; display:block; margin-top:15px;">
                                    <i class="fas fa-info-circle"></i> Cette réservation ne peut pas être annulée
                                </span>
                            `}
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('Erreur:', error);
                document.getElementById('reservationsContainer').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle" style="-webkit-text-fill-color: #ef4444;"></i>
                        <h3 style="color:#ef4444;">Erreur de chargement</h3>
                        <p>Impossible de charger vos réservations. Veuillez réessayer.</p>
                        <button class="btn-primary-modern" onclick="loadReservations()" style="background:linear-gradient(135deg,#ef4444,#dc2626);">
                            <i class="fas fa-sync"></i> Réessayer
                        </button>
                    </div>
                `;
            }
        }

        async function cancelReservation(id) {
            if (!confirm('Voulez-vous vraiment annuler cette réservation ?')) return;

            try {
                const response = await fetch(`/api/reservations/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    alert('✅ Réservation annulée avec succès');
                    loadReservations();
                } else {
                    const data = await response.json();
                    alert('❌ ' + (data.error || 'Erreur lors de l\'annulation'));
                }
            } catch (error) {
                alert('❌ Erreur réseau');
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/login';
        }

        // Charger au démarrage
        loadReservations();
    </script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
