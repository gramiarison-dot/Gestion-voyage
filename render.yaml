services:
  - type: web
    name: Gestion-voyage-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_HOST
        value: ${DATABASE_HOST}
      - key: DB_USER
        value: ${DATABASE_USER}
      - key: DB_PASSWORD
        value: ${DATABASE_PASSWORD}
      - key: DB_NAME
        value: ${DATABASE_NAME}
      - key: DB_PORT
        value: ${DATABASE_PORT}
      - key: JWT_SECRET
        generateValue: true